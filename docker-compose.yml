services:
  backend:
    build: ./backend
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - REAPER_DB_PATH=/data/repo-reaper.db
      - REAPER_WORK_DIR=/tmp/repo-reaper
      - REAPER_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:8080"
    depends_on:
      - backend
    restart: unless-stopped
